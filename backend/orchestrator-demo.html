<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MotionGen Orchestrator Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      background: #050816;
      color: #f5f5f5;
    }
    h1 {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      max-width: 640px;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #0b1020;
      color: #f5f5f5;
    }
    button {
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 4px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .preview {
      background: #020617;
      border-radius: 4px;
      padding: 12px;
      max-width: 480px;
      flex: 0 0 360px;
    }
    .preview-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    #lottie-container {
      width: 100%;
      max-width: 440px;
      height: 320px;
      background: #0b1020;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    #preview-status {
      font-size: 12px;
      color: #9ca3af;
    }
    pre {
      margin-top: 20px;
      padding: 12px;
      background: #020617;
      border-radius: 4px;
      max-width: 960px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>MotionGen Orchestrator Demo</h1>
  <p>Send a prompt to the backend orchestration service and inspect the resulting studio state.</p>
  <label>
    Prompt
    <input id="prompt" type="text" placeholder="Make a bouncing logo" />
  </label>
  <button id="run-btn" type="button">Run Orchestrator</button>
  <div class="layout">
    <div class="preview">
      <div class="preview-title">Lottie Preview</div>
      <div id="lottie-container">No animation yet. Run the orchestrator.</div>
      <div id="preview-status">Waiting for Lottie JSON from orchestrator response.</div>
    </div>
    <pre id="output">Click "Run Orchestrator" to see the response.</pre>
  </div>
  <script>
    const btn = document.getElementById("run-btn");
    const promptInput = document.getElementById("prompt");
    const output = document.getElementById("output");
    const previewStatus = document.getElementById("preview-status");
    const lottieContainer = document.getElementById("lottie-container");
    let currentAnimation = null;

    function renderLottieFromResponse(data) {
      if (!window.lottie || !lottieContainer || !previewStatus) {
        return;
      }

      if (!data || !data.ok || !data.studio || !data.studio.lottieJson) {
        lottieContainer.textContent = "No Lottie JSON in response yet.";
        previewStatus.textContent = "The orchestrator did not return studio.lottieJson.";
        if (currentAnimation) {
          currentAnimation.destroy();
          currentAnimation = null;
        }
        return;
      }

      const animationData = data.studio.lottieJson;

      if (currentAnimation) {
        currentAnimation.destroy();
        currentAnimation = null;
      }

      lottieContainer.innerHTML = "";

      try {
        currentAnimation = lottie.loadAnimation({
          container: lottieContainer,
          renderer: "svg",
          loop: true,
          autoplay: true,
          animationData
        });
        previewStatus.textContent = "Rendering Lottie JSON from orchestrator.";
      } catch (error) {
        lottieContainer.textContent = "Failed to render Lottie animation.";
        previewStatus.textContent = String(error);
      }
    }

    async function runDemo() {
      const prompt = (promptInput.value || "Make a bouncing logo").trim();
      btn.disabled = true;
      output.textContent = "Loading...";
      if (previewStatus) {
        previewStatus.textContent = "Waiting for orchestrator response...";
      }
      try {
        const res = await fetch("http://localhost:7100/orchestrate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
        renderLottieFromResponse(data);
      } catch (error) {
        output.textContent = String(error);
        if (previewStatus) {
          previewStatus.textContent = "Error while calling orchestrator.";
        }
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", runDemo);
  </script>
</body>
</html>
